# =============================================================================
# NetPulse - Docker Compose (PostgreSQL + Backend)
# =============================================================================
# Uso: docker-compose up -d
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: netpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netpulse
      POSTGRES_USER: netpulse
      POSTGRES_PASSWORD: NetPulse2024!Secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netpulse -d netpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netpulse-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://netpulse:NetPulse2024!Secure@postgres:5432/netpulse?schema=public"
      JWT_SECRET: "change-this-to-a-very-long-random-secret-in-production"
      PORT: "3001"
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend (Next.js) - Opcional
  # ---------------------------------------------------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: netpulse-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: "http://backend:3001"

volumes:
  postgres_data:
