# =============================================================================
# NetPulse - Docker Compose Production
# =============================================================================
# Uso: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: netpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netpulse
      POSTGRES_USER: netpulse
      POSTGRES_PASSWORD: NetPulse2024!Secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - netpulse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netpulse -d netpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netpulse-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://netpulse:NetPulse2024!Secure@postgres:5432/netpulse?schema=public"
      JWT_SECRET: "netpulse-jwt-secret-production-1579ee263f202a4bc2f82f6501528867"
      PORT: "3001"
      CORS_ORIGIN: "*"
    networks:
      - netpulse
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # NGINX Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: netpulse-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - netpulse
    depends_on:
      - backend

networks:
  netpulse:
    driver: bridge

volumes:
  postgres_data:
